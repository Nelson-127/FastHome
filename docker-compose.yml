services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flatbot
      POSTGRES_PASSWORD: flatbot
      POSTGRES_DB: flatbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flatbot -d flatbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://flatbot:flatbot@db:5432/flatbot
      BACKEND_BASE_URL: http://api:8000
      PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    environment:
      BACKEND_BASE_URL: http://api:8000
    depends_on:
      - api
    restart: on-failure

volumes:
  pgdata:
